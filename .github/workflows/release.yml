name: Build platform release bundles

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true
        default: v2.0.0

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Job 1 — resolve the version string once; all other jobs inherit it.
# ---------------------------------------------------------------------------
jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      semver:  ${{ steps.ver.outputs.semver }}
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V="${{ inputs.version }}"
          fi
          if [ -z "$V" ]; then
            echo "::error::No version resolved"; exit 1
          fi
          SEMVER="${V#v}"    # strip leading 'v' for npm / electron-builder
          echo "version=$V"     >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V  (semver: $SEMVER)"

  # ---------------------------------------------------------------------------
  # Job 2 — PWA portable bundles (zip / tar.gz with shell launchers).
  # These are kept alongside the native installers so users who prefer a
  # no-install portable bundle can still grab one.
  # ---------------------------------------------------------------------------
  bundle-pwa:
    needs: meta
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage bundles
        shell: bash
        run: |
          set -euxo pipefail
          ROOT="$PWD"
          WEB="$ROOT/web"
          STAGE="$(mktemp -d)"
          OUT="$ROOT/dist"
          mkdir -p "$OUT"

          if [ ! -d "$WEB" ]; then
            echo "::error::web/ directory not found"; exit 1
          fi
          if [ ! -d "$ROOT/launchers" ]; then
            echo "::error::launchers/ directory not found"; exit 1
          fi

          write_install () {
            local file="$1" plat="$2" run_line="$3"
            {
              printf '# Savvy Repair for Microsoft Office — %s\n\n' "$plat"
              printf 'Recover corrupt .docx / .xlsx / .pptx files entirely on your device.\n\n'
              printf '## How to run\n\n%s\n\n' "$run_line"
              printf 'A browser tab will open at http://localhost:8765/ . Stop the server with Ctrl+C when done.\n\n'
              printf '## Alternative\n\nOpen `web/index.html` directly in any modern browser.\n\n'
              printf 'MIT licensed. Source: https://github.com/socrtwo/savvyoffice-SF\n'
            } > "$file"
          }

          mk_pwa_only_install () {
            local file="$1" plat="$2" instructions="$3"
            {
              printf '# Savvy Repair for Microsoft Office — %s\n\n' "$plat"
              printf 'Install as a PWA — works offline, behaves like a native app.\n\n'
              printf '%s\n\n' "$instructions"
              printf 'This bundle is the same PWA payload, in case you want to self-host it.\n'
            } > "$file"
          }

          # ---- Windows ----
          WIN="$STAGE/SavvyRepair-windows-$VERSION"
          mkdir -p "$WIN/web"
          cp -r "$WEB"/. "$WIN/web/"
          cp "launchers/windows/Run Savvy Repair.cmd" "$WIN/"
          write_install "$WIN/INSTALL.md" "Windows" \
            "Double-click **Run Savvy Repair.cmd**. If SmartScreen warns, click **More info → Run anyway**."

          # ---- macOS ----
          MAC="$STAGE/SavvyRepair-macos-$VERSION"
          mkdir -p "$MAC/web"
          cp -r "$WEB"/. "$MAC/web/"
          cp "launchers/macos/Run Savvy Repair.command" "$MAC/"
          chmod +x "$MAC/Run Savvy Repair.command"
          write_install "$MAC/INSTALL.md" "macOS" \
            "Right-click **Run Savvy Repair.command** → **Open**. (Gatekeeper blocks direct double-click on unsigned scripts.)"

          # ---- Linux ----
          LIN="$STAGE/SavvyRepair-linux-$VERSION"
          mkdir -p "$LIN/web"
          cp -r "$WEB"/. "$LIN/web/"
          cp launchers/linux/run-savvy-repair.sh "$LIN/"
          cp launchers/linux/savvy-repair.desktop "$LIN/"
          chmod +x "$LIN/run-savvy-repair.sh"
          write_install "$LIN/INSTALL.md" "Linux" \
            "Run \`./run-savvy-repair.sh\` from a terminal."

          # ---- ChromeOS / Android / iOS (PWA payload + per-platform install note) ----
          CHROME="$STAGE/SavvyRepair-chromeos-$VERSION"
          mkdir -p "$CHROME/web" && cp -r "$WEB"/. "$CHROME/web/"
          mk_pwa_only_install "$CHROME/INSTALL.md" "ChromeOS" \
            "1. Open https://socrtwo.github.io/savvyoffice-SF/ in Chrome.\n2. Address-bar install icon, or menu → Install Savvy Repair…\n3. To run offline from this bundle, right-click web/index.html → Open with → Chrome."

          AND="$STAGE/SavvyRepair-android-$VERSION"
          mkdir -p "$AND/web" && cp -r "$WEB"/. "$AND/web/"
          mk_pwa_only_install "$AND/INSTALL.md" "Android" \
            "1. Open https://socrtwo.github.io/savvyoffice-SF/ in Chrome.\n2. Menu (⋮) → Install app (or Add to Home screen).\n3. Launch from your home screen."

          IOS="$STAGE/SavvyRepair-ios-$VERSION"
          mkdir -p "$IOS/web" && cp -r "$WEB"/. "$IOS/web/"
          mk_pwa_only_install "$IOS/INSTALL.md" "iOS / iPadOS" \
            "1. Open https://socrtwo.github.io/savvyoffice-SF/ in Safari.\n2. Tap Share → Add to Home Screen.\n3. Launches full-screen, no browser chrome."

          # ---- Web (raw PWA payload) ----
          WEB_OUT="$STAGE/SavvyRepair-web-$VERSION"
          mkdir -p "$WEB_OUT"
          cp -r "$WEB"/. "$WEB_OUT/"

          # ---- Pack everything ----
          cd "$STAGE"
          for d in \
            "SavvyRepair-windows-$VERSION" \
            "SavvyRepair-macos-$VERSION" \
            "SavvyRepair-chromeos-$VERSION" \
            "SavvyRepair-android-$VERSION" \
            "SavvyRepair-ios-$VERSION" \
            "SavvyRepair-web-$VERSION"; do
            zip -qr "$OUT/$d.zip" "$d"
          done
          tar -czf "$OUT/SavvyRepair-linux-$VERSION.tar.gz" "SavvyRepair-linux-$VERSION"
          zip -qr  "$OUT/SavvyRepair-linux-$VERSION.zip"   "SavvyRepair-linux-$VERSION"
          ls -la "$OUT"

      - name: Upload PWA bundles
        uses: actions/upload-artifact@v4
        with:
          name: pwa-bundles
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3 — Electron native installer: Windows (NSIS .exe + portable .exe)
  # ---------------------------------------------------------------------------
  build-win:
    needs: meta
    runs-on: windows-latest
    env:
      SEMVER: ${{ needs.meta.outputs.semver }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set version
        run: npm version --no-git-tag-version $env:SEMVER
        shell: pwsh

      - name: Build Windows installers
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            dist-electron/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 4 — Electron native installer: macOS (.dmg, Intel + Apple Silicon)
  # ---------------------------------------------------------------------------
  build-mac:
    needs: meta
    runs-on: macos-latest
    env:
      SEMVER: ${{ needs.meta.outputs.semver }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set version
        run: npm version --no-git-tag-version "$SEMVER"

      - name: Build macOS installer
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is optional — omit CSC_LINK/CSC_KEY_PASSWORD to build
          # without signing (users will need to allow the app in Gatekeeper).

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            dist-electron/*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 5 — Electron native installer: Linux (.AppImage + .deb)
  # ---------------------------------------------------------------------------
  build-linux:
    needs: meta
    runs-on: ubuntu-latest
    env:
      SEMVER: ${{ needs.meta.outputs.semver }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set version
        run: npm version --no-git-tag-version "$SEMVER"

      - name: Build Linux installers
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 6 — Collect all artifacts and publish the GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    needs: [meta, bundle-pwa, build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd all-artifacts
          sha256sum * > "checksums-${{ needs.meta.outputs.version }}.txt"
          echo "=== Release files ==="
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          name: ${{ needs.meta.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: 'true'
          files: all-artifacts/*

